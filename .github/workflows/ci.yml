name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: Install, schema, build, test
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: costlens_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d costlens_ci"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/costlens_ci
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Apply Drizzle schema (Postgres)
        run: pnpm db:push

      - name: Build packages + web
        run: pnpm --filter @costlens/web build

      - name: Test collectors
        run: pnpm --filter @costlens/collectors test

      - name: Test database package
        run: pnpm --filter @costlens/database test
